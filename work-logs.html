<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>工作日志 - 鼎科盛业AI销售作战平台</title><link rel="stylesheet" href="./assets/crm.css" /></head>
  <body data-page="work-logs">
    <div class="app-layout">
      <aside class="sidebar"><a class="brand" href="./dashboard.html"><span class="brand-mark">鼎</span><span><strong>鼎科盛业CRM</strong><small>AI销售作战平台</small></span></a><nav class="menu"><a href="./dashboard.html">经营看板</a><a href="./customers.html">客户管理</a><a href="./projects.html">项目管理</a><a href="./contracts.html">合同管理</a><a href="./finance.html">回款财务</a><a href="./attendance.html">外勤考勤</a><a href="./construction-logs.html">施工日志</a><a href="./work-logs.html">工作日志</a><a href="./reimbursements.html">报销管理</a><a href="./overtime.html">加班管理</a><a href="./ai-assistant.html">AI助手</a></nav></aside>
      <main class="main">
        <header class="topbar"><div><span>Work Logs</span><h1>工作日志</h1></div><div class="actions"><a class="btn" href="./login.html">退出</a></div></header>
        <section class="content">
          <section class="panel"><div class="panel-head"><h2>新增工作日志</h2></div><form class="form-grid" id="workLogForm"><input type="hidden" name="id" /><label>员工姓名<input name="employeeName" required /></label><label>日期<input name="logDate" type="date" required /></label><label class="wide">今日工作内容<input name="content" required /></label><label>拜访客户<input name="customerName" /></label><label>项目进展<input name="projectProgress" /></label><label class="wide">遇到问题<input name="issues" /></label><label class="wide">明日计划<input name="tomorrowPlan" /></label><div class="form-actions"><button class="btn primary" type="submit" id="workLogSubmit">新增日志</button><button class="btn" type="button" id="workLogCancel">取消编辑</button></div></form></section>
          <section class="panel"><div class="panel-head"><h2>工作日志列表</h2></div><div class="table-wrap"><table><thead><tr><th>员工</th><th>日期</th><th>工作内容</th><th>拜访客户</th><th>项目进展</th><th>问题</th><th>明日计划</th><th>操作</th></tr></thead><tbody id="workLogRows"></tbody></table></div></section>
        </section>
      </main>
    </div>
    <script src="./assets/supabase-config.js"></script><script src="./assets/db-service.js"></script><script src="./assets/crm.js"></script>
  </body>
</html>
