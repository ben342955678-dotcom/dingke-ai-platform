<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>报销管理 - 鼎科盛业AI销售作战平台</title><link rel="stylesheet" href="./assets/crm.css" /></head>
  <body data-page="reimbursements">
    <div class="app-layout">
      <aside class="sidebar"><a class="brand" href="./dashboard.html"><span class="brand-mark">鼎</span><span><strong>鼎科盛业CRM</strong><small>AI销售作战平台</small></span></a><nav class="menu"><a href="./dashboard.html">经营看板</a><a href="./customers.html">客户管理</a><a href="./projects.html">项目管理</a><a href="./contracts.html">合同管理</a><a href="./finance.html">回款财务</a><a href="./attendance.html">外勤考勤</a><a href="./construction-logs.html">施工日志</a><a href="./work-logs.html">工作日志</a><a href="./reimbursements.html">报销管理</a><a href="./overtime.html">加班管理</a><a href="./ai-assistant.html">AI助手</a></nav></aside>
      <main class="main">
        <header class="topbar"><div><span>Reimbursements</span><h1>报销管理</h1></div><div class="actions"><a class="btn" href="./login.html">退出</a></div></header>
        <section class="content">
          <section class="panel"><div class="panel-head"><h2>新增报销</h2></div><form class="form-grid" id="reimbursementForm"><input type="hidden" name="id" /><label>报销人<input name="employeeName" required /></label><label>报销类型<select name="type"><option>油费</option><option>停车费</option><option>材料费</option><option>餐费</option><option>住宿费</option><option>工具费</option><option>其他</option></select></label><label>报销金额<input name="amount" type="number" min="0" required /></label><label>所属项目<input name="projectName" /></label><label>发票照片<input name="invoicePhoto" type="file" accept="image/*" capture="environment" /></label><label>审批状态<select name="status"><option>待审批</option><option>已通过</option><option>已驳回</option></select></label><label>审批人<input name="approver" /></label><label class="wide">审批备注<input name="remark" /></label><div class="form-actions"><button class="btn primary" type="submit" id="reimbursementSubmit">新增报销</button><button class="btn" type="button" id="reimbursementCancel">取消编辑</button></div></form></section>
          <section class="panel"><div class="panel-head"><h2>报销列表</h2></div><div class="table-wrap"><table><thead><tr><th>报销人</th><th>类型</th><th>金额</th><th>项目</th><th>发票</th><th>状态</th><th>审批人</th><th>备注</th><th>操作</th></tr></thead><tbody id="reimbursementRows"></tbody></table></div></section>
        </section>
      </main>
    </div>
    <script src="./assets/supabase-config.js"></script><script src="./assets/db-service.js"></script><script src="./assets/crm.js"></script>
  </body>
</html>
